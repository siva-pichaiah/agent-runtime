version: 0.2

phases:

  pre_build:

    commands:

      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

      - REPO_URI=$ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/agent-runtime

      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $REPO_URI

  build:

    commands:

      - docker build -t agent-runtime .

      - docker tag agent-runtime:latest $REPO_URI:latest

  post_build:

    commands:

      - docker push $REPO_URI:latest
